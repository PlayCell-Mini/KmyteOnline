<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard | KMYTE Online</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="admin-layout">

    <!-- Sidebar -->

    <aside class="admin-sidebar">

        <div class="admin-logo">

            <img src="images/logo.png" alt="Logo">

        </div>

        <nav>

            <a href="#" class="active">Dashboard</a>

            <a href="#">Settings</a>

            <a href="#">Subscriptions</a>

            <a href="#">Payments</a>

            <a href="#">Withdrawals</a>

            <a href="#">Users</a>

            <a href="#" id="adminLogout">
                Logout
            </a>

        </nav>

    </aside>





    <!-- Main -->

    <main class="admin-main">

        <h1 id="adminWelcome">

            Admin Dashboard

        </h1>

        <div id="adminContent">

        </div>



        <section class="payment-approval">

            <h2>Pending Payment Approvals</h2>

            <table id="paymentTable">

                <thead>

                    <tr>

                        <th>User UID</th>

                        <th>Amount</th>

                        <th>Method</th>

                        <th>Transaction ID</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="paymentTableBody">

                </tbody>

            </table>

        </section>
        <section class="withdrawal-approval">

            <h2>Pending Withdrawal Requests</h2>

            <table>

                <thead>

                    <tr>

                        <th>User UID</th>

                        <th>Amount</th>

                        <th>Method</th>

                        <th>Account Title</th>

                        <th>Account Number</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="withdrawTableBody">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script type="module"
        src="js/admin.js"></script>
<script type="module" src="js/adminApproval.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile | KMYTE Online</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <h2>My Profile</h2>

    <form id="profileForm">

        <label>Full Name</label>

        <input
            type="text"
            id="fullName"
            required>

        <label>Email</label>

        <input
            type="email"
            id="email"
            readonly>

        <label>Phone</label>

        <input
            type="text"
            id="phone"
            required>

        <label>Referral Code</label>

        <input
            type="text"
            id="referralCode"
            readonly>

        <button type="submit">

            Save Changes

        </button>

    </form>

</div>

<script type="module" src="js/profile.js"></script>
<script type="module" src="js/session.js"></script>

</body>

</html>

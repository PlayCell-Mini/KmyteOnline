<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Profile | KMYTE Online</title>

    <link rel="stylesheet" href="css/style.css">

    <link 
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

    <h2>My Profile</h2>

    <form id="profileForm">

        <label>Full Name</label>

        <input
            type="text"
            id="fullName"
            required>

        <label>Email</label>

        <input
            type="email"
            id="email"
            readonly>

        <label>Phone</label>

        <input
            type="text"
            id="phone"
            required>

        <label>Referral Code</label>

        <input
            type="text"
            id="referralCode"
            readonly>

        <button type="submit">

            Save Changes

        </button>

    </form>

    <hr>

    <h3>Change Password</h3>

    <form id="passwordForm">

        <label>Current Password</label>

        <div class="password-group">

            <input
                type="password"
                id="currentPassword"
                required>

            <button
                type="button"
                class="toggle-password"
                data-target="currentPassword">

                <i class="fa-solid fa-eye"></i>

            </button>

        </div>

        <label>New Password</label>

        <div class="password-group">

            <input
                type="password"
                id="newPassword"
                minlength="6"
                required>

            <button
                type="button"
                class="toggle-password"
                data-target="newPassword">

                <i class="fa-solid fa-eye"></i>

            </button>

        </div>

        <label>Confirm New Password</label>

        <div class="password-group">

            <input
                type="password"
                id="confirmPassword"
                minlength="6"
                required>

            <button
                type="button"
                class="toggle-password"
                data-target="confirmPassword">

                <i class="fa-solid fa-eye"></i>

            </button>

        </div>

        <button type="submit">

            Update Password

        </button>

    </form>

</div>

<script type="module" src="js/profile.js"></script>
<script type="module" src="js/session.js"></script>

</body>

</html>

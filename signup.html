<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account | KMYTE Online</title>

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Global CSS -->

    <link rel="stylesheet"
          href="css/style.css">

    <!-- Auth CSS -->

    <link rel="stylesheet"
          href="css/auth.css">

</head>

<body>

    <!-- =====================================
                AUTH CONTAINER
    ====================================== -->

    <section class="auth">

        <div class="auth-container">

            <!-- LEFT SIDE -->

            <div class="auth-left">

                <img src="images/logo/logo.png"
                     alt="Logo">

                <h1>

                    Welcome To
                    <span>KMYTE Online</span>

                </h1>

                <p>

                    Create your account and start your
                    subscription journey with secure
                    payment tracking and withdrawals.

                </p>

            </div>





            <!-- RIGHT SIDE -->

            <div class="auth-right">

                <div class="auth-card">

                    <h2>

                        Create Account

                    </h2>

                    <p>

                        Fill the information below

                    </p>





                    <form id="signupForm">

                        <!-- Full Name -->

                        <div class="form-group">

                            <label>

                                Full Name

                            </label>

                            <input

                                type="text"

                                id="fullName"

                                placeholder="Enter Full Name"

                                required>

                        </div>





                        <!-- Email -->

                        <div class="form-group">

                            <label>

                                Email Address

                            </label>

                            <input

                                type="email"

                                id="email"

                                placeholder="Enter Email"

                                required>

                        </div>





                        <!-- Phone -->

                        <div class="form-group">

                            <label>

                                Phone Number

                            </label>

                            <input

                                type="tel"

                                id="phone"

                                placeholder="03XXXXXXXXX"

                                required>

                        </div>





                        <!-- Password -->

                        <div class="form-group">

                            <label>

                                Password

                            </label>

                            <input

                                type="password"

                                id="password"

                                placeholder="Enter Password"

                                required>

                        </div>





                        <!-- Confirm -->

                        <div class="form-group">

                            <label>

                                Confirm Password

                            </label>

                            <input

                                type="password"

                                id="confirmPassword"

                                placeholder="Confirm Password"

                                required>

                        </div>





                        <!-- Referral -->

                        <div class="form-group">

                            <label>

                                Referral Code

                                (Optional)

                            </label>

                            <input

                                type="text"

                                id="referral"

                                placeholder="Referral Code">

                        </div>





                        <!-- Terms -->

                        <div class="checkbox">

                            <input

                                type="checkbox"

                                id="terms"

                                required>

                            <label for="terms">

                                I agree to the

                                Terms & Conditions

                            </label>

                        </div>





                        <!-- Button -->

                        <button

                            class="btn btn-primary auth-btn"

                            type="submit">

                            Create Account

                        </button>

                    </form>





                    <div class="auth-footer">

                        Already have an account?

                        <a href="login.html">

                            Login

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </section>





    <script type="module" src="js/auth.js"></script>


</body>

</html>

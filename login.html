<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | KMYTE Online</title>

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Global CSS -->

    <link rel="stylesheet"
          href="css/style.css">

    <!-- Auth CSS -->

    <link rel="stylesheet"
          href="css/auth.css">

    <link 
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<section class="auth">

    <div class="auth-container">

        <!-- LEFT SIDE -->

        <div class="auth-left">

            <img src="images/logo.png"
                 alt="KMYTE Online Logo">

            <h1>

                Welcome Back To

                <span>KMYTE Online</span>

            </h1>

            <p>

                Login to manage your subscription,
                track daily payments and request
                withdrawals securely.

            </p>

        </div>





        <!-- RIGHT SIDE -->

        <div class="auth-right">

            <div class="auth-card">

                <h2>

                    Login

                </h2>

                <p>

                    Enter your account details

                </p>





                <form id="loginForm">

                    <!-- Email -->

                    <div class="form-group">

                        <label>

                            Email Address

                        </label>

                        <input

                            type="email"

                            id="loginEmail"

                            placeholder="Enter Email"

                            required>

                    </div>





                    <!-- Password -->

                    <div class="form-group">

                        <label>

                            Password

                        </label>

                        <div class="password-group">

                            <input
                                type="password"
                                id="password"
                                required>

                            <button
                                type="button"
                                class="toggle-password"
                                data-target="password">

                                <i class="fa-solid fa-eye"></i>

                            </button>

                        </div>

                    </div>





                    <!-- Remember -->

                    <div class="checkbox">

                        <input

                            type="checkbox"

                            id="rememberMe">

                        <label for="rememberMe">

                            Remember Me

                        </label>

                    </div>





                    <!-- Login -->

                    <button

                        class="btn btn-primary auth-btn"

                        type="submit">

                        Login

                    </button>

                </form>





                <div class="auth-footer">

                    Don't have an account?

                    <a href="signup.html">

                        Create Account

                    </a>

                </div>

            </div>

        </div>

    </div>

</section>

<script type="module" src="js/auth.js"></script>

</body>

</html>

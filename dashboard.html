<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | KMYTE Online</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="dashboard">

    <!-- ==========================================
         SIDEBAR
    =========================================== -->

    <aside class="sidebar">

        <div class="sidebar-logo">

            <img src="images/logo.png" alt="Logo">

        </div>

        <nav>

            <a href="#" class="active">
                Dashboard
            </a>

            <a href="#">
                Subscription
            </a>

            <a href="#">
                Daily Payments
            </a>

            <a href="#">
                Withdrawal
            </a>

            <a href="#">
                Profile
            </a>

            <a href="#" id="logoutBtn">
                Logout
            </a>

        </nav>

    </aside>

    <!-- ==========================================
         MAIN CONTENT
    =========================================== -->

    <main class="main-content">

        <!-- Top Bar -->

        <header class="topbar">

            <h2 id="welcomeText">

                Dashboard

            </h2>

        </header>

        <!-- ==========================================
             DASHBOARD CONTENT
        =========================================== -->

        <section id="dashboardContent">

            <!-- ==========================================
                 ACTIVE SUBSCRIPTION
            =========================================== -->

            <section id="activeSubscription"
                     class="active-subscription"
                     style="display:none;">

                <h2>Your Active Subscription</h2>

                <div class="subscription-info">

                    <div class="info-card">

                        <h3>Plan</h3>

                        <p id="activePlan">-</p>

                    </div>

                    <div class="info-card">

                        <h3>Current Day</h3>

                        <p id="currentDay">-</p>

                    </div>

                    <div class="info-card">

                        <h3>Today's Payment</h3>

                        <p id="todayAmount">-</p>

                    </div>

                    <div class="info-card">

                        <h3>Status</h3>

                        <p id="paymentStatus">Pending</p>

                    </div>

                </div>

                <button id="payNowBtn" class="primary-btn">

                    Pay Now

                </button>

            </section>

            <!-- ==========================================
                 SUBSCRIPTION PLANS
            =========================================== -->

            <section id="subscriptionSection"
                     class="subscription-section">

                <h2>Choose Your Subscription Plan</h2>

                <div class="plans-grid">

                    <!-- 7 Days -->

                    <div class="plan-card"
                         data-plan="7">

                        <h3>7 Days</h3>

                        <p id="plan7Amount">

                            Loading...

                        </p>

                        <button class="subscribe-btn">

                            Subscribe

                        </button>

                    </div>

                    <!-- 15 Days -->

                    <div class="plan-card"
                         data-plan="15">

                        <h3>15 Days</h3>

                        <p id="plan15Amount">

                            Loading...

                        </p>

                        <button class="subscribe-btn">

                            Subscribe

                        </button>

                    </div>

                    <!-- 30 Days -->

                    <div class="plan-card"
                         data-plan="30">

                        <h3>30 Days</h3>

                        <p id="plan30Amount">

                            Loading...

                        </p>

                        <button class="subscribe-btn">

                            Subscribe

                        </button>

                    </div>

                </div>

            </section>

        </section>

    </main>

</div>

<!-- ==========================================
     JAVASCRIPT
=========================================== -->

<script type="module" src="js/dashboard.js"></script>

<script type="module" src="js/subscription.js"></script>

<script type="module" src="js/payment.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard | KMYTE Online</title>

    <link rel="stylesheet"
          href="css/style.css">

    <link rel="stylesheet"
          href="css/dashboard.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="sidebar-logo">

            <img src="images/logo.png"
                 alt="Logo">

        </div>

        <nav>

            <a href="#" class="active">

                Dashboard

            </a>

            <a href="#">

                Subscription

            </a>

            <a href="#">

                Daily Payments

            </a>

            <a href="#">

                Withdrawal

            </a>

            <a href="#">

                Profile

            </a>

            <a href="#"
               id="logoutBtn">

                Logout

            </a>

        </nav>

    </aside>





    <!-- Main -->

    <main class="main-content">

        <header class="topbar">

            <h2 id="welcomeText">
                Dashboard
            </h2>

        </header>





        <section id="dashboardContent">
            <section class="subscription-section">

                <h2>Choose Your Subscription Plan</h2>

                <div class="plans-grid">

                    <div class="plan-card" data-plan="7">

                        <h3>7 Days</h3>

                        <p id="plan7Amount">Loading...</p>

                        <button class="subscribe-btn">
                            Subscribe
                        </button>

                    </div>

                    <div class="plan-card" data-plan="15">

                        <h3>15 Days</h3>

                        <p id="plan15Amount">Loading...</p>

                        <button class="subscribe-btn">
                            Subscribe
                        </button>

                    </div>

                    <div class="plan-card" data-plan="30">

                        <h3>30 Days</h3>

                        <p id="plan30Amount">Loading...</p>

                        <button class="subscribe-btn">
                            Subscribe
                        </button>

                    </div>

                </div>

            </section>

        </section>

    </main>

</div>

<script type="module"
        src="js/dashboard.js"></script>
<script type="module" src="js/subscription.js"></script>

</body>

</html>
